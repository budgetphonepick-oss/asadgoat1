<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopHub - Your Online Shopping Destination</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Header/Navigation -->
    <header class="header">
        <div class="header-container">
            <div class="logo">
                <i class="fas fa-shopping-bag"></i>
                <span>ShopHub</span>
            </div>
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="Search products...">
                <button id="searchBtn"><i class="fas fa-search"></i></button>
            </div>
            <div class="header-right">
                <button class="account-btn"><i class="fas fa-user"></i> Account</button>
                <button class="cart-btn" id="cartBtn">
                    <i class="fas fa-shopping-cart"></i>
                    Cart <span id="cartCount" class="cart-count">0</span>
                </button>
            </div>
        </div>
    </header>

    <!-- Filter Section -->
    <div class="filter-section">
        <div class="filter-container">
            <div class="filter-group">
                <label>Category:</label>
                <select id="categoryFilter">
                    <option value="">All Categories</option>
                    <option value="electronics">Electronics</option>
                    <option value="clothing">Clothing</option>
                    <option value="home">Home & Kitchen</option>
                    <option value="sports">Sports</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Price Range:</label>
                <input type="range" id="priceFilter" min="0" max="50000" step="100">
                <span id="priceValue">₹50000</span>
            </div>
            <div class="filter-group">
                <label>Sort By:</label>
                <select id="sortFilter">
                    <option value="">Relevance</option>
                    <option value="price-low">Price: Low to High</option>
                    <option value="price-high">Price: High to Low</option>
                    <option value="rating">Highest Rating</option>
                </select>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="container">
        <!-- Products Section -->
        <section class="products-section">
            <h2>Featured Products</h2>
            <div class="products-grid" id="productsGrid">
                <!-- Products will be loaded here by JavaScript -->
            </div>
        </section>
    </div>

    <!-- Shopping Cart Modal -->
    <div class="modal" id="cartModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Shopping Cart</h2>
                <button class="close-btn" id="closeCart">&times;</button>
            </div>
            <div class="modal-body">
                <div id="cartItems">
                    <!-- Cart items will be displayed here -->
                </div>
            </div>
            <div class="modal-footer">
                <div class="cart-summary">
                    <div class="summary-item">
                        <span>Subtotal:</span>
                        <span id="subtotal">₹0</span>
                    </div>
                    <div class="summary-item">
                        <span>Shipping:</span>
                        <span>₹0</span>
                    </div>
                    <div class="summary-item total">
                        <span>Total:</span>
                        <span id="total">₹0</span>
                    </div>
                </div>
                <button class="checkout-btn" id="checkoutBtn">Proceed to Checkout</button>
            </div>
        </div>
    </div>

    <!-- Product Detail Modal -->
    <div class="modal" id="productModal">
        <div class="modal-content product-detail">
            <button class="close-btn" id="closeProduct">&times;</button>
            <div class="product-detail-content" id="productDetailContent">
                <!-- Product details will be loaded here -->
            </div>
        </div>
    </div>

    <!-- Success Modal -->
    <div class="modal" id="successModal">
        <div class="modal-content success-content">
            <div class="success-icon"><i class="fas fa-check-circle"></i></div>
            <h2>Order Placed Successfully!</h2>
            <p>Thank you for your purchase. Your order has been confirmed.</p>
            <button class="btn-primary" id="continueShoppingBtn">Continue Shopping</button>
        </div>
    </div>

    <footer class="footer">
        <p>&copy; 2026 ShopHub. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
